<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ventas · Viva Pizza</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f5f5f5; display: flex; justify-content: center; padding: 2rem 1rem; min-height: 100vh; }
    .container { width: 100%; max-width: 780px; }

    h1 { font-size: 20px; font-weight: 700; color: #111; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 8px; }

    .card { background: #fff; border-radius: 12px; padding: 1.5rem; box-shadow: 0 2px 12px rgba(0,0,0,0.08); margin-bottom: 1.25rem; }

    label { font-size: 13px; color: #666; display: block; margin-bottom: 6px; }
    input[type="date"] { width: 100%; padding: 8px 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; outline: none; }
    input[type="date"]:focus { border-color: #888; }

    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 1rem; }
    .accesos { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1.25rem; }
    .accesos button { font-size: 13px; padding: 5px 14px; border: 1px solid #ddd; border-radius: 20px; background: #fff; cursor: pointer; color: #333; }
    .accesos button:hover { background: #f0f0f0; }

    .btn-consultar { width: 100%; padding: 10px; background: #111; color: #fff; border: none; border-radius: 8px; font-size: 15px; cursor: pointer; }
    .btn-consultar:hover { background: #333; }
    .btn-consultar:disabled { background: #aaa; cursor: not-allowed; }

    .sucursales { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
    @media (max-width: 520px) { .sucursales { grid-template-columns: 1fr; } }

    .sucursal-card { background: #fff; border-radius: 12px; padding: 1.25rem 1.5rem; box-shadow: 0 2px 12px rgba(0,0,0,0.08); border-top: 4px solid #ddd; }
    .sucursal-card.armenia { border-top-color: #e63312; }
    .sucursal-card.izalco  { border-top-color: #f5a623; }

    .sucursal-nombre { font-size: 13px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
    .sucursal-total { font-size: 32px; font-weight: 700; color: #111; }
    .sucursal-estado { font-size: 12px; color: #aaa; margin-top: 6px; min-height: 16px; }

    .total-card { background: #111; border-radius: 12px; padding: 1.25rem 1.5rem; box-shadow: 0 2px 12px rgba(0,0,0,0.15); display: none; }
    .total-card .label { font-size: 13px; color: #aaa; margin-bottom: 4px; }
    .total-card .valor { font-size: 36px; font-weight: 700; color: #fff; }
    .total-card .periodo { font-size: 12px; color: #666; margin-top: 6px; }

    .estado-global { font-size: 13px; color: #888; margin-top: 0.75rem; min-height: 18px; text-align: center; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🍕 Ventas · Viva Pizza</h1>

    <div class="card">
      <div class="grid">
        <div>
          <label>Desde</label>
          <input type="date" id="from-date" />
        </div>
        <div>
          <label>Hasta</label>
          <input type="date" id="to-date" />
        </div>
      </div>

      <div class="accesos">
        <button onclick="setHoy()">Hoy</button>
        <button onclick="setAyer()">Ayer</button>
        <button onclick="setSemana()">Esta semana</button>
        <button onclick="setMes()">Este mes</button>
      </div>

      <button class="btn-consultar" id="btn-consultar" onclick="consultar()">Consultar ventas</button>
      <div class="estado-global" id="estado-global"></div>
    </div>

    <div class="sucursales">
      <div class="sucursal-card armenia">
        <div class="sucursal-nombre">🔴 Armenia</div>
        <div class="sucursal-total" id="total-armenia">—</div>
        <div class="sucursal-estado" id="estado-armenia"></div>
      </div>
      <div class="sucursal-card izalco">
        <div class="sucursal-nombre">🟠 Izalco</div>
        <div class="sucursal-total" id="total-izalco">—</div>
        <div class="sucursal-estado" id="estado-izalco"></div>
      </div>
    </div>

    <div class="total-card" id="total-card">
      <div class="label">Total combinado</div>
      <div class="valor" id="total-combinado">—</div>
      <div class="periodo" id="label-periodo"></div>
    </div>
  </div>

  <script>
    const PROXY = 'https://vivapizza-proxy.onrender.com';
    const fmt = n => new Intl.NumberFormat('es-SV', { style: 'currency', currency: 'USD', minimumFractionDigits: 2 }).format(n);
    const fmtDate = s => new Date(s + 'T12:00:00').toLocaleDateString('es-SV', { day: 'numeric', month: 'long', year: 'numeric' });
    const toISO = d => d.toISOString().slice(0, 10);

    function addDays(iso, n) { const d = new Date(iso + 'T12:00:00'); d.setDate(d.getDate() + n); return toISO(d); }
    function hoy() { return toISO(new Date()); }
    function ayer() { const d = new Date(); d.setDate(d.getDate() - 1); return toISO(d); }
    function inicioSemana() { const d = new Date(); d.setDate(d.getDate() - d.getDay()); return toISO(d); }
    function inicioMes() { const d = new Date(); d.setDate(1); return toISO(d); }

    function setHoy()   { set(hoy(), hoy()); }
    function setAyer()  { set(ayer(), ayer()); }
    function setSemana(){ set(inicioSemana(), hoy()); }
    function setMes()   { set(inicioMes(), hoy()); }
    function set(f, t)  { document.getElementById('from-date').value = f; document.getElementById('to-date').value = t; }

    setHoy();

    async function fetchSucursal(sucursal, from, toApi) {
      const res = await fetch(`${PROXY}/${sucursal}/orden-trabajo/total?from=${from}&to=${toApi}`);
      if (!res.ok) throw new Error('Error ' + res.status);
      return await res.json();
    }

    async function consultar() {
      const from = document.getElementById('from-date').value;
      const to   = document.getElementById('to-date').value;

      if (!from || !to) { document.getElementById('estado-global').textContent = 'Selecciona un rango de fechas.'; return; }
      if (from > to)    { document.getElementById('estado-global').textContent = 'La fecha inicial no puede ser mayor a la final.'; return; }

      document.getElementById('estado-global').textContent = 'Consultando...';
      document.getElementById('btn-consultar').disabled = true;
      document.getElementById('total-armenia').textContent = '...';
      document.getElementById('total-izalco').textContent = '...';
      document.getElementById('estado-armenia').textContent = '';
      document.getElementById('estado-izalco').textContent = '';
      document.getElementById('total-card').style.display = 'none';

      const toApi = addDays(to, 1);

      const [resArmenia, resIzalco] = await Promise.allSettled([
        fetchSucursal('armenia', from, toApi),
        fetchSucursal('izalco',  from, toApi),
      ]);

      let totalArmenia = null;
      let totalIzalco  = null;

      if (resArmenia.status === 'fulfilled') {
        totalArmenia = resArmenia.value.total;
        document.getElementById('total-armenia').textContent = fmt(totalArmenia);
        document.getElementById('estado-armenia').textContent = '';
      } else {
        document.getElementById('total-armenia').textContent = '—';
        document.getElementById('estado-armenia').textContent = 'No disponible';
      }

      if (resIzalco.status === 'fulfilled') {
        totalIzalco = resIzalco.value.total;
        document.getElementById('total-izalco').textContent = fmt(totalIzalco);
        document.getElementById('estado-izalco').textContent = '';
      } else {
        document.getElementById('total-izalco').textContent = '—';
        document.getElementById('estado-izalco').textContent = 'No disponible';
      }

      if (totalArmenia !== null && totalIzalco !== null) {
        document.getElementById('total-combinado').textContent = fmt(totalArmenia + totalIzalco);
        document.getElementById('label-periodo').textContent =
          from === to ? `Ventas del ${fmtDate(from)}` : `Ventas del ${fmtDate(from)} al ${fmtDate(to)}`;
        document.getElementById('total-card').style.display = 'block';
      }

      document.getElementById('estado-global').textContent = '';
      document.getElementById('btn-consultar').disabled = false;
    }
  </script>
</body>
</html>
